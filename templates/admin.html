{{ define "content" }}
<h1 class="text-4xl font-bold mb-4">Admin Dashboard</h1>
<div class="bg-white p-4 rounded shadow">
    <h2 class="text-2xl font-bold mb-2">User Management</h2>
    <table class="w-full">
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{ range .Users }}
            <tr>
                <td>{{ .Username }}</td>
                <td>{{ .Email }}</td>
                <td>{{ .Role }}</td>
                <td>
                    <a href="/admin/edit-user/{{ .ID }}" class="text-blue-500 hover:underline">Edit</a>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ end }}
