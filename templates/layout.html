<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - Subad</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.6.1"></script>
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold">Subad</a>
            <div>
                <a href="/pages" class="mr-4 hover:text-blue-200">Pages</a>
                <a href="/status" class="mr-4 hover:text-blue-200">Status</a>
                {{ if .User }}
                    <a href="/dashboard" class="mr-4 hover:text-blue-200">Dashboard</a>
                    <a href="/logout" class="hover:text-blue-200">Logout</a>
                {{ else }}
                    <a href="/login" class="mr-4 hover:text-blue-200">Login</a>
                    <a href="/register" class="hover:text-blue-200">Register</a>
                {{ end }}
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4 flex-grow">
        {{ if .FlashMessage }}
        <div class="bg-blue-100 border-l-4 border-blue-500 text-blue-700 p-4 mb-4" role="alert">
            <p>{{ .FlashMessage }}</p>
        </div>
        {{ end }}
        {{ template "content" . }}
    </main>

    <footer class="bg-gray-200 text-center p-4 mt-8">
        <p>&copy; 2023 Subad. All rights reserved.</p>
    </footer>
</body>
</html>
