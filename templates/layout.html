{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - Subad</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.6.1"></script>
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico">
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 text-white p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold">Subad</a>
            <div>
                <a href="/pages" class="mr-4">Pages</a>
                <a href="/status" class="mr-4">Status</a>
                {{ if .User }}
                    <a href="/dashboard" class="mr-4">Dashboard</a>
                    <a href="/logout">Logout</a>
                {{ else }}
                    <a href="/login" class="mr-4">Login</a>
                    <a href="/register">Register</a>
                {{ end }}
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-8 p-4">
        {{ template "content" . }}
    </main>

    <footer class="bg-gray-200 text-center p-4 mt-8">
        <p>&copy; 2023 Subad. All rights reserved.</p>
    </footer>
</body>
</html>
{{ end }}
