{{ define "content" }}
<h1 class="text-4xl font-bold mb-4">Welcome, {{ .User.Username }}</h1>
<div class="bg-white p-4 rounded shadow">
    <h2 class="text-2xl font-bold mb-2">Your Status</h2>
    <p>Current Status: {{ .UserStatus }}</p>
    <a href="/earn-token" class="bg-blue-500 text-white px-4 py-2 rounded mt-2 inline-block">Earn Token</a>
</div>
<div class="bg-white p-4 rounded shadow mt-4">
    <h2 class="text-2xl font-bold mb-2">Your Pages</h2>
    <ul>
        {{ range .Pages }}
        <li>
            <a href="/pages/{{ .ID }}" class="text-blue-500 hover:underline">{{ .Title }}</a>
        </li>
        {{ end }}
    </ul>
    <a href="/create-page" class="bg-green-500 text-white px-4 py-2 rounded mt-2 inline-block">Create New Page</a>
</div>
{{ end }}
