{{ define "content" }}
<form hx-post="/register" hx-target="#status-message" hx-swap="innerHTML" class="bg-white p-8 rounded shadow-md">
    <h2 class="text-2xl mb-4">Register</h2>
    <input type="text" name="username" placeholder="Username" class="w-full p-2 mb-4 border rounded">
    <input type="email" name="email" placeholder="Email" class="w-full p-2 mb-4 border rounded">
    <input type="password" name="password" placeholder="Password" class="w-full p-2 mb-4 border rounded">
    <label class="flex items-center mb-4">
        <input type="checkbox" name="is_admin" value="true" class="mr-2">
        <span>Register as admin</span>
    </label>
    <button type="submit" class="w-full bg-green-500 text-white p-2 rounded">Register</button>
</form>
<div id="status-message" class="mt-4 text-center text-red-500"></div>


<script>
    document.body.addEventListener('htmx:afterSwap', function(event) {
        var response = JSON.parse(event.detail.xhr.response);
        if (response.error) {
            document.getElementById('status-message').textContent = response.error;
        } else if (response.redirect) {
            window.location.href = response.redirect;
        }
    });
</script>

{{ end }}
