{{ define "content" }}
<div class="max-w-md mx-auto">
    <h2 class="text-2xl font-bold mb-4">Login to Subad</h2>
    <form hx-post="/login" hx-target="#login-form" hx-swap="outerHTML">
        <div class="mb-4">
            <label for="username" class="block text-gray-700 text-sm font-bold mb-2">Username</label>
            <input type="text" id="username" name="username" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
        </div>
        <div class="mb-6">
            <label for="password" class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" id="password" name="password" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline">
        </div>
        <div class="flex items-center justify-between">
            <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                Sign In
            </button>
            <a href="/register" class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800">
                Need an account?
            </a>
        </div>
    </form>
    <div id="login-message" class="mt-4 text-red-500"></div>
</div>

<script>
    document.body.addEventListener('htmx:afterSwap', function(event) {
        if (event.detail.target.id === 'login-form') {
            var response = JSON.parse(event.detail.xhr.response);
            if (response.error) {
                document.getElementById('login-message').textContent = response.error;
            } else if (response.redirect) {
                window.location.href = response.redirect;
            }
        }
    });
</script>
{{ end }}
