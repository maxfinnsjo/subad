<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://unpkg.com/htmx.org@1.6.1"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded shadow-md">
        <form hx-post="/login" hx-swap="outerHTML" class="mb-4">
            <h2 class="text-2xl mb-4">Login</h2>
            <input type="text" name="username" placeholder="Username" class="w-full p-2 mb-4 border rounded">
            <input type="password" name="password" placeholder="Password" class="w-full p-2 mb-4 border rounded">
            <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded">Login</button>
        </form>
        <div class="text-center">
            <a href="/register-page" class="text-blue-500 hover:underline">Register new account</a>
        </div>
    </div>
    <div id="status-message" class="mt-4 text-center text-red-500"></div>

</body>
</html>
